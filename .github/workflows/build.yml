name: Build & Sign APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Create gradlew that uses system gradle
        working-directory: android
        run: |
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          exec gradle "$@"
          GRADLEW
          chmod +x gradlew
          gradle --version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Generate launcher icons
        run: |
          python3 - << 'PYEOF'
          import os, struct, zlib
          def make_png(size, bg=(26,115,232)):
              pixels = []
              cx, cy, r = size//2, size//2, int(size*0.45)
              for y in range(size):
                  row = []
                  for x in range(size):
                      dist = ((x-cx)**2 + (y-cy)**2)**0.5
                      row += (list(bg)+[255]) if dist<=r else [0,0,0,0]
                  pixels.append(bytes(row))
              def chunk(n,d):
                  c=zlib.crc32(n+d)&0xffffffff
                  return struct.pack('>I',len(d))+n+d+struct.pack('>I',c)
              raw=b''.join(b'\x00'+row for row in pixels)
              png=b'\x89PNG\r\n\x1a\n'
              png+=chunk(b'IHDR',struct.pack('>IIBBBBB',size,size,8,6,0,0,0))
              png+=chunk(b'IDAT',zlib.compress(raw,9))
              png+=chunk(b'IEND',b'')
              return png
          sizes={'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          base='android/app/src/main/res'
          for folder,size in sizes.items():
              path=os.path.join(base,folder)
              os.makedirs(path,exist_ok=True)
              png=make_png(size)
              for name in ['ic_launcher.png','ic_launcher_round.png']:
                  target=os.path.join(path,name)
                  if not os.path.exists(target):
                      open(target,'wb').write(png)
                      print(f'Created {folder}/{name}')
                  else:
                      print(f'OK {folder}/{name}')
          PYEOF

      - name: Inject server URL
        working-directory: android
        run: |
          URL="${{ secrets.SERVER_URL }}"
          if [ -z "$URL" ]; then URL="http://37.46.19.193:8000"; fi
          sed -i "s|http://YOUR_SERVER_IP:8000|${URL}|g" app/build.gradle
          echo "Server URL: $URL"

      - name: Write signing config
        working-directory: android
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
            python3 - << 'PYEOF'
          content = open('app/build.gradle').read()
          signing = """
          android.signingConfigs {
              release {
                  storeFile file("release.keystore")
                  storePassword System.getenv("KEYSTORE_PASSWORD")
                  keyAlias System.getenv("KEY_ALIAS")
                  keyPassword System.getenv("KEY_PASSWORD")
              }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          """
          open('app/build.gradle','w').write(content + signing)
          print("Signing config added")
          PYEOF
            echo "SIGNING=release" >> $GITHUB_ENV
          else
            echo "SIGNING=debug" >> $GITHUB_ENV
          fi

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Build Release APK
        if: env.SIGNING == 'release'
        working-directory: android
        run: gradle assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Collect and rename APKs
        run: |
          mkdir -p apk-output
          DATE=$(date +%Y%m%d-%H%M)
          SHA=$(git rev-parse --short=7 HEAD)
          
          # Очищаем директорию перед копированием
          rm -rf apk-output/*
          mkdir -p apk-output
          
          # Копируем ТОЛЬКО файлы с расширением .apk
          find android/app/build/outputs/apk -type f -name "*.apk" | while read apk_file; do
            if [[ "$apk_file" == *"debug"* ]]; then
              TYPE="debug"
            elif [[ "$apk_file" == *"release"* ]]; then
              TYPE="release"
            else
              TYPE="unknown"
            fi
            
            NEW_NAME="Messenger-${TYPE}-${DATE}-${SHA}.apk"
            cp "$apk_file" "apk-output/${NEW_NAME}"
            
            SIZE=$(stat -c%s "apk-output/${NEW_NAME}")
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "✅ Copied: $(basename "$apk_file") -> ${NEW_NAME} (${SIZE_MB} MB)"
          done
          
          APK_COUNT=$(find apk-output -name "*.apk" -type f | wc -l)
          echo ""
          echo "📊 Found ${APK_COUNT} APK file(s)"
          
          if [ ${APK_COUNT} -eq 0 ]; then
            echo "❌ ERROR: No APK files found!"
            echo "Searching in: android/app/build/outputs/apk/"
            find android/app/build/outputs/apk -type f | head -20
            exit 1
          fi
          
          echo ""
          echo "📦 APK files in apk-output:"
          ls -lh apk-output/

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Messenger-Debug-APK
          path: apk-output/Messenger-debug-*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release APK
        if: env.SIGNING == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: Messenger-Release-APK
          path: apk-output/Messenger-release-*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Summary
        if: always()
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | $(git rev-parse --short=7 HEAD) |" >> $GITHUB_STEP_SUMMARY
          echo "| Signing | ${{ env.SIGNING }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date +'%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          APK_COUNT=$(find apk-output -name "*.apk" 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -gt 0 ]; then
            echo "### 📱 APK Files:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            find apk-output -name "*.apk" -type f | while read f; do
              SIZE=$(ls -lh "$f" | awk '{print $5}')
              NAME=$(basename "$f")
              echo "- \`${NAME}\` (${SIZE})" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "### ❌ No APK files found!" >> $GITHUB_STEP_SUMMARY
            echo "Build may have failed. Please check logs above." >> $GITHUB_STEP_SUMMARY
          fi
