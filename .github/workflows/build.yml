name: Build & Sign APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      # Используем официальный gradle action — он сам ставит gradle и wrapper
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Create gradlew that uses system gradle
        working-directory: android
        run: |
          # Заменяем gradlew скриптом который использует gradle из PATH
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          exec gradle "$@"
          GRADLEW
          chmod +x gradlew
          gradle --version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Generate launcher icons
        run: |
          python3 - << 'PYEOF'
          import os, struct, zlib
          def make_png(size, bg=(26,115,232)):
              pixels = []
              cx, cy, r = size//2, size//2, int(size*0.45)
              for y in range(size):
                  row = []
                  for x in range(size):
                      dist = ((x-cx)**2 + (y-cy)**2)**0.5
                      row += (list(bg)+[255]) if dist<=r else [0,0,0,0]
                  pixels.append(bytes(row))
              def chunk(n,d):
                  c=zlib.crc32(n+d)&0xffffffff
                  return struct.pack('>I',len(d))+n+d+struct.pack('>I',c)
              raw=b''.join(b'\x00'+row for row in pixels)
              png=b'\x89PNG\r\n\x1a\n'
              png+=chunk(b'IHDR',struct.pack('>IIBBBBB',size,size,8,6,0,0,0))
              png+=chunk(b'IDAT',zlib.compress(raw,9))
              png+=chunk(b'IEND',b'')
              return png
          sizes={'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          base='android/app/src/main/res'
          for folder,size in sizes.items():
              path=os.path.join(base,folder)
              os.makedirs(path,exist_ok=True)
              png=make_png(size)
              for name in ['ic_launcher.png','ic_launcher_round.png']:
                  target=os.path.join(path,name)
                  if not os.path.exists(target):
                      open(target,'wb').write(png)
                      print(f'Created {folder}/{name}')
                  else:
                      print(f'OK {folder}/{name}')
          PYEOF

      - name: Inject server URL
        working-directory: android
        run: |
          URL="${{ secrets.SERVER_URL }}"
          if [ -z "$URL" ]; then URL="http://37.46.19.193:8000"; fi
          sed -i "s|http://YOUR_SERVER_IP:8000|${URL}|g" app/build.gradle
          echo "Server URL: $URL"

      - name: Write signing config
        working-directory: android
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
            python3 - << 'PYEOF'
          content = open('app/build.gradle').read()
          signing = """
          android.signingConfigs {
              release {
                  storeFile file("release.keystore")
                  storePassword System.getenv("KEYSTORE_PASSWORD")
                  keyAlias System.getenv("KEY_ALIAS")
                  keyPassword System.getenv("KEY_PASSWORD")
              }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          """
          open('app/build.gradle','w').write(content + signing)
          print("Signing config added")
          PYEOF
            echo "SIGNING=release" >> $GITHUB_ENV
          else
            echo "SIGNING=debug" >> $GITHUB_ENV
          fi

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Build Release APK
        if: env.SIGNING == 'release'
        working-directory: android
        run: gradle assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Collect APKs
        run: |
          mkdir -p apk-output
          DATE=$(date +%Y%m%d-%H%M)
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          find android/app/build/outputs/apk -name "*.apk" | while read f; do
            TYPE=$(echo "$f" | grep -o 'debug\|release')
            OUT="apk-output/Messenger-${TYPE}-${DATE}-${SHA}.apk"
            cp "$f" "$OUT"
            echo "Ready: $(basename $OUT)"
          done
          ls -lh apk-output/
          
      - name: Fix APK naming
        run: |
          mkdir -p apk-output
          # Копируем все APK файлы с правильным расширением
          find android/app/build/outputs/apk -name "*.apk" -exec cp {} apk-output/ \;
          # Переименовываем файлы без расширения
          for f in apk-output/*; do
            if [[ ! "$f" == *.apk ]] && [[ -f "$f" ]]; then
              mv "$f" "${f}.apk"
            fi
          done
          ls -la apk-output/
            - name: Upload Debug APK
              uses: actions/upload-artifact@v4
              with:
                name: Messenger-Debug-APK
                path: apk-output/Messenger-debug-*.apk
                retention-days: 30

      - name: Upload Release APK
        if: env.SIGNING == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: Messenger-Release-APK
          path: apk-output/Messenger-release-*.apk
          retention-days: 90

      - name: Summary
        if: always()
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | $(echo "${{ github.sha }}" | cut -c1-7) |" >> $GITHUB_STEP_SUMMARY
          echo "| Signing | ${{ env.SIGNING }} |" >> $GITHUB_STEP_SUMMARY
          APK_COUNT=$(find apk-output -name "*.apk" 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -gt 0 ]; then
            find apk-output -name "*.apk" | while read f; do
              echo "| APK | $(basename $f) |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "| APK | build failed - check logs |" >> $GITHUB_STEP_SUMMARY
          fi
