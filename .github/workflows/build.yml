name: Build & Sign APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Download gradle-wrapper.jar
        working-directory: android
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Fix gradlew
        working-directory: android
        run: |
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          APP_HOME="$(cd "$(dirname "$0")" && pwd)"
          exec "$JAVA_HOME/bin/java" \
            -classpath "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" \
            org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          chmod +x gradlew

      - name: Inject server URL
        working-directory: android
        run: |
          URL="${{ secrets.SERVER_URL }}"
          [ -z "$URL" ] && URL="http://YOUR_SERVER_IP:8000"
          sed -i "s|http://YOUR_SERVER_IP:8000|${URL}|g" app/build.gradle

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Collect APK
        run: |
          mkdir -p apk-output
          DATE=$(date +%Y%m%d-%H%M)
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "apk-output/Messenger-debug-${DATE}-${SHA}.apk"
          ls -lh apk-output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Messenger-Debug-APK
          path: apk-output/*.apk
          retention-days: 30
