name: Build & Sign APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Ручной запуск из вкладки Actions
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Тип сборки'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

# Разрешения для загрузки артефактов
permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK ─────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Подставляем SERVER_URL из секрета ──────────────────────────────
      - name: Inject server URL into build.gradle
        working-directory: android
        run: |
          SERVER_URL="${{ secrets.SERVER_URL }}"
          if [ -z "$SERVER_URL" ]; then
            SERVER_URL="http://YOUR_SERVER_IP:8000"
            echo "⚠️  SECRET 'SERVER_URL' not set — using placeholder"
          fi

          # Заменяем в build.gradle
          sed -i "s|http://YOUR_SERVER_IP:8000|${SERVER_URL}|g" app/build.gradle

          # Для release — используем HTTPS если задан
          RELEASE_URL="${{ secrets.SERVER_URL_RELEASE }}"
          if [ -n "$RELEASE_URL" ]; then
            sed -i "s|https://YOUR_DOMAIN.COM|${RELEASE_URL}|g" app/build.gradle
            HOSTNAME=$(echo "$RELEASE_URL" | sed 's|https://||' | sed 's|/.*||')
            sed -i "s|YOUR_DOMAIN.COM|${HOSTNAME}|g" app/build.gradle
          fi

          echo "✅ Server URL configured"

      # ── 6. Создаём keystore для подписи (из секрета или генерируем debug) ─
      - name: Set up signing keystore
        working-directory: android
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "🔑 Using release keystore from secret"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

            cat >> app/build.gradle << 'GRADLE_EOF'

          // Signing config injected by CI
          android.signingConfigs {
              release {
                  storeFile file("release.keystore")
                  storePassword System.getenv("KEYSTORE_PASSWORD")
                  keyAlias System.getenv("KEY_ALIAS")
                  keyPassword System.getenv("KEY_PASSWORD")
              }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          GRADLE_EOF

            echo "SIGNING=release" >> $GITHUB_ENV
          else
            echo "⚠️  No KEYSTORE_BASE64 secret — building debug APK only"
            echo "SIGNING=debug" >> $GITHUB_ENV
          fi

      # ── 7. Gradle permissions ──────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      # ── 8. Build DEBUG APK ─────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      # ── 9. Build RELEASE APK (если есть keystore) ─────────────────────────
      - name: Build Release APK
        if: env.SIGNING == 'release'
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 10. Переименовываем APK с версией и датой ─────────────────────────
      - name: Rename APKs
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)

          mkdir -p apk-output

          # Debug APK
          DEBUG_SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$DEBUG_SRC" ]; then
            cp "$DEBUG_SRC" "apk-output/Messenger-debug-${DATE}-${COMMIT}.apk"
            echo "DEBUG_APK=apk-output/Messenger-debug-${DATE}-${COMMIT}.apk" >> $GITHUB_ENV
            echo "✅ Debug APK ready"
          fi

          # Release APK
          RELEASE_SRC="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$RELEASE_SRC" ]; then
            cp "$RELEASE_SRC" "apk-output/Messenger-release-${DATE}-${COMMIT}.apk"
            echo "RELEASE_APK=apk-output/Messenger-release-${DATE}-${COMMIT}.apk" >> $GITHUB_ENV
            echo "✅ Release APK ready"
          fi

          ls -lh apk-output/

      # ── 11. Загружаем APK как артефакт GitHub ─────────────────────────────
      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Messenger-Debug-APK
          path: apk-output/Messenger-debug-*.apk
          retention-days: 30

      - name: Upload Release APK artifact
        if: env.SIGNING == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: Messenger-Release-APK
          path: apk-output/Messenger-release-*.apk
          retention-days: 90

      # ── 12. Создаём GitHub Release при пуше тега v* ───────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && env.SIGNING == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: apk-output/*.apk
          generate_release_notes: true
          body: |
            ## 📱 Messenger APK

            ### Установка
            1. Скачайте `Messenger-release-*.apk`
            2. На Android: **Настройки → Безопасность → Неизвестные источники** (или разрешите для браузера)
            3. Откройте скачанный файл и установите

            ### Что нового
            ${{ github.event.head_commit.message }}

      # ── 13. Краткий отчёт ─────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Параметр | Значение |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$(echo ${{ github.sha }} | cut -c1-7)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Signing | \`${{ env.SIGNING }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "${{ env.DEBUG_APK }}" ]; then
            SIZE=$(du -sh "${{ env.DEBUG_APK }}" | cut -f1)
            echo "✅ **Debug APK:** $SIZE" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "${{ env.RELEASE_APK }}" ]; then
            SIZE=$(du -sh "${{ env.RELEASE_APK }}" | cut -f1)
            echo "✅ **Release APK:** $SIZE" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Скачайте APK во вкладке **Actions → текущий запуск → Artifacts**" >> $GITHUB_STEP_SUMMARY
