name: Generate Keystore (запустить один раз)

# Этот workflow запускается ВРУЧНУЮ один раз для генерации keystore.
# После выполнения скопируйте значения из Summary в Secrets репозитория.
on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias (например: messenger-key)'
        required: true
        default: 'messenger-key'
      validity_years:
        description: 'Срок действия (лет)'
        required: true
        default: '25'
      org_name:
        description: 'Название организации/имя'
        required: true
        default: 'Messenger App'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          ALIAS="${{ github.event.inputs.key_alias }}"
          YEARS="${{ github.event.inputs.validity_years }}"
          ORG="${{ github.event.inputs.org_name }}"

          # Генерируем случайные пароли
          STORE_PASS=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 32)
          KEY_PASS=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 32)

          echo "Generating keystore..."
          keytool -genkey -v \
            -keystore release.keystore \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 4096 \
            -validity $((YEARS * 365)) \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=$ORG, OU=Android, O=$ORG, L=Unknown, S=Unknown, C=US"

          # Кодируем в base64
          KEYSTORE_B64=$(base64 -w 0 release.keystore)

          # Выводим в Summary (НЕ в логи — логи публичны)
          echo "## 🔑 Keystore сгенерирован" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Добавьте следующие **Secrets** в репозиторий:" >> $GITHUB_STEP_SUMMARY
          echo "**Settings → Secrets and variables → Actions → New repository secret**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret name | Значение |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEYSTORE_BASE64\` | (см. артефакт \`keystore-secrets.txt\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEYSTORE_PASSWORD\` | (см. артефакт) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEY_ALIAS\` | \`$ALIAS\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEY_PASSWORD\` | (см. артефакт) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Артефакт с паролями удалится через 1 день. Сохраните данные надёжно!**" >> $GITHUB_STEP_SUMMARY

          # Сохраняем в файл-артефакт (приватный, доступен только авторизованным пользователям репо)
          cat > keystore-secrets.txt << EOF
          KEYSTORE_BASE64=${KEYSTORE_B64}
          KEYSTORE_PASSWORD=${STORE_PASS}
          KEY_ALIAS=${ALIAS}
          KEY_PASSWORD=${KEY_PASS}
          EOF

          echo "✅ Done"

      - name: Upload secrets file
        uses: actions/upload-artifact@v4
        with:
          name: keystore-secrets
          path: keystore-secrets.txt
          retention-days: 1   # Автоудаление через 1 день
